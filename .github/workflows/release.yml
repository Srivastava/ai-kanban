name: Nightly Release

on:
  push:
    branches: [main]
    paths: ['.github/workflows/release.yml']
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static export
        working-directory: frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-out
          path: frontend/out/
          retention-days: 1

  build:
    name: Build ${{ matrix.name }}
    needs: build-frontend
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: ai-kanban-linux-x86_64

          - name: macos-x86_64
            runner: macos-13
            target: x86_64-apple-darwin
            binary: ai-kanban-macos-x86_64

          - name: macos-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            binary: ai-kanban-macos-arm64

          - name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: ai-kanban-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-out
          path: frontend/out/

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        working-directory: backend
        env:
          SQLX_OFFLINE: "true"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: matrix.runner != 'windows-latest'
        run: cp backend/target/${{ matrix.target }}/release/ai-kanban-backend ${{ matrix.binary }}

      - name: Rename binary (Windows)
        if: matrix.runner == 'windows-latest'
        run: copy backend\target\${{ matrix.target }}\release\ai-kanban-backend.exe ${{ matrix.binary }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set release tag
        id: tag
        run: echo "tag=nightly-$(date -u '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: 'ai-kanban-*'
          merge-multiple: true

      - name: Compute checksums
        working-directory: dist
        run: |
          sha256sum ai-kanban-linux-x86_64 \
                    ai-kanban-macos-x86_64 \
                    ai-kanban-macos-arm64 \
                    ai-kanban-windows-x86_64.exe \
            > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Nightly ${{ steps.tag.outputs.tag }}"
          prerelease: true
          body: |
            Automated nightly build from `main`.

            ## Download
            | Platform | Binary |
            |----------|--------|
            | Linux x86_64 | `ai-kanban-linux-x86_64` |
            | macOS Intel | `ai-kanban-macos-x86_64` |
            | macOS Apple Silicon | `ai-kanban-macos-arm64` |
            | Windows x86_64 | `ai-kanban-windows-x86_64.exe` |

            Verify with `checksums.txt`.

            ## Prerequisite
            [Claude CLI](https://docs.anthropic.com/en/docs/claude-cli) must be installed and authenticated.
          files: |
            dist/ai-kanban-linux-x86_64
            dist/ai-kanban-macos-x86_64
            dist/ai-kanban-macos-arm64
            dist/ai-kanban-windows-x86_64.exe
            dist/checksums.txt

      - name: Delete old nightly releases (keep 7)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --repo ${{ github.repository }} --limit 100 --json tagName,createdAt \
            | jq -r 'sort_by(.createdAt) | reverse | .[7:] | .[] | .tagName' \
            | grep '^nightly-' \
            | while read -r tag; do
                echo "Deleting old release: $tag"
                gh release delete "$tag" --repo ${{ github.repository }} --yes --cleanup-tag
              done
