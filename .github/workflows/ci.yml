name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Create placeholder frontend/out for rust-embed
        run: |
          mkdir -p frontend/out
          echo '<html><body>ci-placeholder</body></html>' > frontend/out/index.html

      - name: Check formatting
        working-directory: backend
        run: cargo fmt --check

      - name: Clippy
        working-directory: backend
        env:
          SQLX_OFFLINE: "true"
        # -W clippy::all catches real bugs without failing on pre-existing style warnings
        run: cargo clippy -- -W clippy::all

      - name: Test
        working-directory: backend
        env:
          SQLX_OFFLINE: "true"
        run: cargo test

  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npx eslint

      - name: Test
        working-directory: frontend
        run: npm test

      - name: Build (verify static export works)
        working-directory: frontend
        run: npm run build
